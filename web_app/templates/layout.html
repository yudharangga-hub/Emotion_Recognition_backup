<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Scanner - Thesis S2</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div class="grid-bg"></div>

    <header>
        <div class="logo-container" style="display:flex; align-items:center; gap:15px;">
            <img src="{{ url_for('static', filename='logo_unpam.png') }}" alt="Logo" class="logo">
            <div class="header-text">
                <h1>NEURAL SCANNER</h1>
                <p>MAGISTER TEKNIK INFORMATIKA</p>
            </div>
        </div>
        
        <nav class="cyber-nav">
            <a href="{{ url_for('index') }}" class="nav-btn {{ 'active' if active_page == 'home' else '' }}">[ DASHBOARD ]</a>
            <a href="{{ url_for('arsitektur') }}" class="nav-btn {{ 'active' if active_page == 'arsitektur' else '' }}">[ ARSITEKTUR ]</a>
            <a href="{{ url_for('laporan') }}" class="nav-btn {{ 'active' if active_page == 'laporan' else '' }}">[ LAPORAN ]</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="footer-left">
            <strong>Dwi Joko Nurdadi</strong> | NIM: 24101200044 | UNIVERSITAS PAMULANG
        </div>
        <div class="footer-right">
            TECH: Python 3.10 • PyTorch • Flask • OpenCV • ResNet50 • ViT
        </div>
    </footer>

</body>
</html>
